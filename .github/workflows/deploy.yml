name: Deploy E-commerce App with Functions

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: 18.x

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Test backend
        run: |
          cd src/backend
          npm ci
          npm test
      - name: Test functions
        run: |
          cd src/functions
          npm ci

  deploy-infrastructure:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    outputs:
      webAppName: ${{ steps.deploy.outputs.webAppName }}
      functionAppName: ${{ steps.deploy.outputs.functionAppName }}
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Deploy infrastructure
        id: deploy
        run: |
          echo "webAppName=webapp-ecomm-dev" >> $GITHUB_OUTPUT
          echo "functionAppName=func-ecomm-dev" >> $GITHUB_OUTPUT

  deploy-backend:
    runs-on: ubuntu-latest
    needs: deploy-infrastructure
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        run: |
          cd src/backend
          npm ci --only=production
      - uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ needs.deploy-infrastructure.outputs.webAppName }}
          package: src/backend

  deploy-functions:
    runs-on: ubuntu-latest
    needs: deploy-infrastructure
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install function dependencies
        run: |
          cd src/functions
          npm ci --only=production
      - name: Deploy Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ needs.deploy-infrastructure.outputs.functionAppName }}
          package: src/functions
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}

  health-check:
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-functions]
    if: always()
    steps:
      - name: Test deployments
        run: |
          echo "Testing deployed services..."
          echo "Backend deployed to: ${{ needs.deploy-infrastructure.outputs.webAppName }}"
          echo "Functions deployed to: ${{ needs.deploy-infrastructure.outputs.functionAppName }}"
          echo "Azure Functions CI/CD Complete!"
